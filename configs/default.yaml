# SolarSDE Default Configuration

# Data
data:
  cloudcv_url: "https://data.nrel.gov/submissions/248"
  bms_url: "https://midcdmz.nrel.gov/apps/sitehome.pl?site=BMS"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  metadata_dir: "data/metadata"
  image_size: 256
  sequence_length: 30        # Number of past timesteps (10s each = 5 min)
  forecast_horizons: [6, 12, 30, 60, 90, 120, 180]  # steps (×10s = 1,2,5,10,15,20,30 min)
  train_days: 60
  val_days: 15
  test_days: 15
  solar_zenith_max: 85.0
  ramp_threshold: 50.0       # W/m² per minute

# Location (NREL SRRL, Golden, CO)
location:
  latitude: 39.742
  longitude: -105.18
  altitude: 1829
  timezone: "America/Denver"

# CS-VAE
vae:
  latent_dim: 64
  beta: 0.1
  encoder_channels: [32, 64, 128, 256, 512]
  learning_rate: 1.0e-4
  batch_size: 64
  epochs: 100

# CTI
cti:
  window_size: 10            # Number of frames for velocity variance

# Neural SDE
sde:
  drift_hidden: 256
  drift_layers: 4            # 2 linear + 2 ResBlock
  diffusion_hidden: 64
  covariate_dim: 5           # solar_zenith, temperature, humidity, wind_speed, clear_sky_index
  lambda_sigma: 1.0
  learning_rate: 1.0e-4
  batch_size: 128
  epochs: 200

# Score-Matching Decoder (CSMID)
score:
  hidden_dim: 256
  num_res_blocks: 2
  diffusion_steps: 100
  beta_start: 1.0e-4
  beta_end: 0.02
  learning_rate: 1.0e-4
  batch_size: 256
  epochs: 100

# End-to-end fine-tuning
finetune:
  learning_rate: 1.0e-5
  epochs: 50
  alpha: 1.0                 # SDE loss weight
  gamma: 1.0                 # Score loss weight

# Inference
inference:
  num_samples: 100           # Monte Carlo sample paths
  sde_method: "euler_maruyama"
  dt: 10.0                   # seconds

# Baselines
baselines:
  lstm:
    hidden_size: 128
    num_layers: 2
    lookback: 30
    learning_rate: 1.0e-3
    epochs: 100
    batch_size: 128
  mc_dropout:
    dropout: 0.1
    num_forward_passes: 100
  deep_ensemble:
    num_members: 5
  timegrad:
    hidden_size: 64
    num_layers: 2
    diffusion_steps: 100
    learning_rate: 1.0e-3
    epochs: 100
  csdi:
    d_model: 64
    nhead: 4
    num_layers: 4
    diffusion_steps: 100
    learning_rate: 1.0e-3
    epochs: 100
  cnn_image:
    backbone: "resnet18"
    learning_rate: 1.0e-3
    epochs: 100

# Evaluation
evaluation:
  pi_level: 0.90             # 90% prediction interval
  bootstrap_samples: 1000
  seeds: [42, 123, 456]

# Logging
logging:
  use_wandb: false
  project_name: "solar-sde"
  log_interval: 100
